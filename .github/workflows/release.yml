name: Build and Release

on:
  release:
    types: [created]
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-latest
            args: --mac
            artifact: "*.dmg"
          - os: windows-latest
            args: --win
            artifact: "*.exe"
          - os: ubuntu-latest
            args: --linux
            artifact: "*.AppImage"

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build web app
        run: npm run build

      - name: Build and publish Electron app
        run: npx electron-builder ${{ matrix.args }} --publish ${{ github.event_name == 'release' && 'always' || 'never' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload build artifact
        if: github.event_name != 'release'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ runner.os }}-build
          path: release/${{ matrix.artifact }}
          retention-days: 7
